name: self-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri + audio + enigo system dependencies
        # Tauri 2.x -> webkit2gtk-4.1 + libsoup-3; alsa for cpal; libxdo for enigo (X11 input sim); build-essential for bundled rusqlite.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxdo-dev \
            pkg-config \
            build-essential

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run self-test (fast mode -- skips BFCL + latency)
        shell: bash
        run: |
          # exits: 0=PASS, 1=DEGRADED (smoke fixture absent, expected on CI), 2=FAIL
          ./scripts/self_test.sh --fast || rc=$?
          rc=${rc:-0}
          echo "self-test exit: $rc"
          if [[ $rc -gt 1 ]]; then
            echo "::error::Self-test FAILED"
            exit $rc
          fi

      - name: Upload self-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-report
          path: |
            /tmp/sunny_selftest/report.json
            /tmp/sunny_selftest/logs/
          if-no-files-found: warn
